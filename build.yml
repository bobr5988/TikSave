name: Build EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build EXE
        run: npm run dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TikSave-Windows
          path: dist/*.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: TikSave v1.0.${{ github.run_number }}
          files: dist/*.exe
          generate_release_notes: false
          body: |
            ## TikSave — TikTok Downloader

            Скачайте `TikSave Setup.exe` и запустите — установится автоматически.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
