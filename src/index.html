<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src https://www.tikwm.com https://tikwm.com; img-src * data:;">
<title>TikSave</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0a; --surface: #141414; --surface2: #1e1e1e;
    --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.15);
    --text: #f0f0f0; --muted: #888; --accent: #fe2c55; --accent2: #25f4ee; --green: #4ade80;
  }
  html, body {
    height: 100%; background: var(--bg); color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 15px;
    -webkit-font-smoothing: antialiased; overflow: hidden;
    background-image: radial-gradient(ellipse 80% 40% at 50% -5%, rgba(254,44,85,0.13), transparent);
  }

  /* Titlebar */
  .titlebar {
    -webkit-app-region: drag;
    display: flex; align-items: center; justify-content: space-between;
    height: 40px; padding: 0 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .titlebar-title {
    font-size: 13px; font-weight: 500; color: var(--muted);
    display: flex; align-items: center; gap: 8px;
  }
  .titlebar-title svg { width: 14px; height: 14px; fill: var(--accent); }
  .titlebar-controls {
    -webkit-app-region: no-drag;
    display: flex; gap: 6px;
  }
  .titlebar-btn {
    width: 28px; height: 28px; border-radius: 8px; border: none;
    background: transparent; cursor: pointer; display: flex;
    align-items: center; justify-content: center; transition: background 0.15s;
  }
  .titlebar-btn:hover { background: var(--surface2); }
  .titlebar-btn svg { width: 12px; height: 12px; stroke: var(--muted); fill: none; stroke-width: 2; }
  .titlebar-btn.close:hover { background: rgba(254,44,85,0.2); }
  .titlebar-btn.close:hover svg { stroke: var(--accent); }

  /* Layout */
  .app { display: flex; flex-direction: column; height: 100vh; }
  .content { flex: 1; overflow-y: auto; padding: 1.5rem 1.25rem 2rem; }
  .content::-webkit-scrollbar { width: 4px; }
  .content::-webkit-scrollbar-track { background: transparent; }
  .content::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

  h1 { font-size: 20px; font-weight: 500; letter-spacing: -0.4px; margin-bottom: 5px; line-height: 1.3; }
  .sub { font-size: 13px; color: var(--muted); margin-bottom: 1.25rem; line-height: 1.5; }

  .input-row { display: flex; gap: 8px; margin-bottom: 0.75rem; }
  #url {
    flex: 1; height: 44px; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 0 12px; font-size: 14px; font-family: inherit;
    color: var(--text); outline: none; transition: border-color 0.2s; min-width: 0;
  }
  #url::placeholder { color: #555; }
  #url:focus { border-color: var(--border2); }
  #go {
    height: 44px; padding: 0 18px; background: var(--accent); color: white; border: none;
    border-radius: 10px; font-size: 14px; font-weight: 500; font-family: inherit;
    cursor: pointer; white-space: nowrap; transition: opacity 0.15s, transform 0.1s; flex-shrink: 0;
  }
  #go:active { opacity: 0.85; transform: scale(0.97); }
  #go:disabled { opacity: 0.4; cursor: default; transform: none; }

  #status { font-size: 13px; color: var(--muted); min-height: 18px; display: flex; align-items: center; gap: 8px; margin-bottom: 0.6rem; }
  .spinner { width: 13px; height: 13px; border: 2px solid #333; border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }

  #error { display: none; background: rgba(254,44,85,0.1); border: 1px solid rgba(254,44,85,0.25); border-radius: 10px; padding: 10px 13px; font-size: 13px; color: #ff6b85; line-height: 1.6; margin-bottom: 0.75rem; white-space: pre-line; }
  #result { display: none; }

  .thumb-wrap { border-radius: 10px; overflow: hidden; margin-bottom: 10px; background: var(--surface2); }
  .thumb { width: 100%; display: block; max-height: 200px; object-fit: cover; }
  .meta { margin-bottom: 12px; }
  .meta .title { font-size: 13px; line-height: 1.5; color: var(--text); margin-bottom: 3px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .meta .author { font-size: 12px; color: var(--muted); }

  .dl-btn {
    display: flex; align-items: center; justify-content: space-between;
    width: 100%; padding: 0 14px; height: 46px; border-radius: 10px;
    font-size: 14px; font-weight: 500; font-family: inherit; cursor: pointer;
    transition: opacity 0.15s, transform 0.1s; margin-bottom: 7px; border: none;
  }
  .dl-btn:active { opacity: 0.85; transform: scale(0.98); }
  .dl-btn:disabled { opacity: 0.5; cursor: default; transform: none; }
  .dl-btn.primary { background: var(--accent); color: white; }
  .dl-btn.secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border2); }
  .dl-btn.audio { background: var(--surface2); color: var(--accent2); border: 1px solid rgba(37,244,238,0.2); }
  .dl-btn .badge { font-size: 10px; font-weight: 400; opacity: 0.75; background: rgba(255,255,255,0.15); padding: 2px 7px; border-radius: 20px; }

  .divider { height: 1px; background: var(--border); margin: 12px 0; }
  .progress-wrap { display: none; background: var(--surface2); border-radius: 6px; overflow: hidden; height: 5px; margin-top: 8px; }
  .progress-bar { height: 100%; background: var(--accent); width: 0%; border-radius: 6px; transition: width 0.3s; }
  .progress-label { display: none; font-size: 11px; color: var(--muted); margin-top: 5px; text-align: center; }
</style>
</head>
<body>
<div class="app">
  <div class="titlebar">
    <div class="titlebar-title">
      <svg viewBox="0 0 24 24"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V8.88a8.23 8.23 0 0 0 4.83 1.55V7a4.85 4.85 0 0 1-1.06-.31z"/></svg>
      TikSave
    </div>
    <div class="titlebar-controls">
      <button class="titlebar-btn" onclick="window.electronAPI.minimize()" title="Свернуть">
        <svg viewBox="0 0 12 12"><line x1="2" y1="6" x2="10" y2="6"/></svg>
      </button>
      <button class="titlebar-btn close" onclick="window.electronAPI.close()" title="Закрыть">
        <svg viewBox="0 0 12 12"><line x1="2" y1="2" x2="10" y2="10"/><line x1="10" y1="2" x2="2" y2="10"/></svg>
      </button>
    </div>
  </div>

  <div class="content">
    <h1>Скачать видео<br>без водяного знака</h1>
    <p class="sub">Вставьте любую ссылку — короткую или полную.</p>

    <div class="input-row">
      <input id="url" type="url" placeholder="https://vt.tiktok.com/..." autocomplete="off" spellcheck="false" />
      <button id="go" onclick="doDownload()">Скачать</button>
    </div>

    <div id="status"></div>
    <div id="error"></div>

    <div id="result">
      <div class="thumb-wrap" id="thumb-wrap" style="display:none;">
        <img class="thumb" id="thumb" src="" alt="" />
      </div>
      <div class="meta" id="meta"></div>
      <div id="buttons"></div>
    </div>
  </div>
</div>

<script>
async function doDownload() {
  const urlVal = document.getElementById('url').value.trim();
  const btn = document.getElementById('go');
  const errEl = document.getElementById('error');
  const resultEl = document.getElementById('result');
  errEl.style.display = 'none';
  resultEl.style.display = 'none';
  if (!urlVal || !urlVal.includes('tiktok.com')) {
    showErr('Вставьте ссылку на видео TikTok.\n\nПример: https://vt.tiktok.com/...');
    return;
  }
  btn.disabled = true;
  setStatus('Получаем данные видео...', true);
  try {
    const data = await fetchFromTikwm(urlVal);
    setStatus(''); showResult(data);
  } catch(e) {
    setStatus('Пробуем резервный метод...', true);
    try {
      const data2 = await fetchFromTikwmGet(urlVal);
      setStatus(''); showResult(data2);
    } catch(e2) {
      setStatus('');
      showErr('Не удалось получить видео.\n\nПроверьте:\n• Видео не закрыто приватностью\n• Интернет-соединение работает\n• Ссылка скопирована полностью');
    }
  }
  btn.disabled = false;
}

async function fetchFromTikwm(url) {
  const res = await fetch('https://www.tikwm.com/api/', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: 'url=' + encodeURIComponent(url) + '&hd=1'
  });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  const json = await res.json();
  if (json.code !== 0) throw new Error(json.msg || 'error');
  return parseData(json.data);
}

async function fetchFromTikwmGet(url) {
  const res = await fetch('https://tikwm.com/api/?url=' + encodeURIComponent(url) + '&hd=1');
  if (!res.ok) throw new Error('HTTP ' + res.status);
  const json = await res.json();
  if (!json.data) throw new Error('no data');
  return parseData(json.data);
}

function fixUrl(u) {
  if (!u) return null;
  if (u.startsWith('http')) return u;
  return 'https://www.tikwm.com' + u;
}

function parseData(d) {
  return {
    video: fixUrl(d.play), videoHD: fixUrl(d.hdplay),
    audio: fixUrl(d.music), cover: fixUrl(d.cover),
    title: d.title || '', author: d.author ? d.author.nickname : '',
    id: d.id || d.video_id || String(Date.now()),
  };
}

function showResult(data) {
  const resultEl = document.getElementById('result');
  const thumbWrap = document.getElementById('thumb-wrap');
  const thumb = document.getElementById('thumb');
  const metaEl = document.getElementById('meta');
  const buttonsEl = document.getElementById('buttons');
  if (data.cover) {
    thumb.src = data.cover;
    thumb.onerror = () => { thumbWrap.style.display = 'none'; };
    thumbWrap.style.display = 'block';
  } else {
    thumbWrap.style.display = 'none';
  }
  let metaHtml = '';
  if (data.title) metaHtml += '<div class="title">' + esc(data.title) + '</div>';
  if (data.author) metaHtml += '<div class="author">@' + esc(data.author) + '</div>';
  metaEl.innerHTML = metaHtml;

  let btns = '';
  if (data.videoHD) {
    btns += '<button class="dl-btn primary" data-url="' + data.videoHD + '" data-name="tiktok-hd-' + data.id + '.mp4"><span>Скачать HD</span><span class="badge">без водяного знака</span></button>';
  }
  if (data.video) {
    const cls = data.videoHD ? 'secondary' : 'primary';
    const label = data.videoHD ? 'Скачать видео (SD)' : 'Скачать видео';
    btns += '<button class="dl-btn ' + cls + '" data-url="' + data.video + '" data-name="tiktok-' + data.id + '.mp4"><span>' + label + '</span><span class="badge">MP4</span></button>';
  }
  if (data.audio) {
    btns += '<div class="divider"></div>';
    btns += '<button class="dl-btn audio" data-url="' + data.audio + '" data-name="tiktok-audio-' + data.id + '.mp3"><span>Только аудио</span><span class="badge">MP3</span></button>';
  }
  btns += '<div class="progress-wrap" id="progress-wrap"><div class="progress-bar" id="progress-bar"></div></div>';
  btns += '<div class="progress-label" id="progress-label"></div>';
  buttonsEl.innerHTML = btns;

  buttonsEl.querySelectorAll('.dl-btn').forEach(function(b) {
    b.addEventListener('click', function() {
      startDownload(b.dataset.url, b.dataset.name, b);
    });
  });
  resultEl.style.display = 'block';
}

async function startDownload(url, filename, btn) {
  const progressWrap = document.getElementById('progress-wrap');
  const progressBar = document.getElementById('progress-bar');
  const progressLabel = document.getElementById('progress-label');
  const allBtns = document.querySelectorAll('.dl-btn');

  allBtns.forEach(b => b.disabled = true);
  const origHTML = btn.innerHTML;
  btn.querySelector('span').textContent = 'Загружаем...';
  btn.querySelector('.badge').textContent = '0%';
  progressBar.style.background = 'var(--accent)';
  progressBar.style.width = '0%';
  progressWrap.style.display = 'block';
  progressLabel.style.display = 'block';
  progressLabel.textContent = 'Подготовка...';

  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error('fetch failed');
    const contentLength = res.headers.get('Content-Length');
    const total = contentLength ? parseInt(contentLength) : 0;
    const reader = res.body.getReader();
    const chunks = [];
    let loaded = 0;
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      chunks.push(value);
      loaded += value.length;
      if (total) {
        const pct = Math.round((loaded / total) * 100);
        progressBar.style.width = pct + '%';
        btn.querySelector('.badge').textContent = pct + '%';
        progressLabel.textContent = formatBytes(loaded) + ' / ' + formatBytes(total);
      } else {
        progressLabel.textContent = 'Загружено: ' + formatBytes(loaded);
        progressBar.style.width = '70%';
      }
    }
    progressBar.style.width = '100%';
    progressLabel.textContent = 'Сохраняем файл...';
    const blob = new Blob(chunks);
    const objUrl = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = objUrl;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(objUrl), 5000);
    btn.querySelector('span').textContent = '✓ Готово';
    btn.querySelector('.badge').textContent = formatBytes(loaded);
    progressBar.style.background = 'var(--green)';
    progressLabel.textContent = 'Файл сохранён в папку Загрузки';
  } catch(e) {
    btn.innerHTML = origHTML;
    progressWrap.style.display = 'none';
    progressLabel.style.display = 'none';
  }
  allBtns.forEach(b => b.disabled = false);
}

function formatBytes(bytes) {
  if (bytes < 1024 * 1024) return Math.round(bytes / 1024) + ' KB';
  return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
}
function showErr(msg) {
  const el = document.getElementById('error');
  el.textContent = msg;
  el.style.display = 'block';
}
function setStatus(msg, loading) {
  const el = document.getElementById('status');
  if (!msg) { el.innerHTML = ''; return; }
  el.innerHTML = loading ? '<div class="spinner"></div>' + msg : msg;
}
function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
document.getElementById('url').addEventListener('keydown', e => {
  if (e.key === 'Enter') doDownload();
});
</script>
</body>
</html>
